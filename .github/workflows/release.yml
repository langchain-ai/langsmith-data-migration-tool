name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build package
        run: uv build

      - name: Verify wheel contents
        run: python3 .github/scripts/check_wheel_contents.py dist/*.whl

      - name: Extract release notes
        id: extract-release-notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          # Extract the release notes for this version from CHANGELOG.md
          sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '$d' > release_notes.md
          # If release_notes.md is empty, create a simple default message
          if [ ! -s release_notes.md ]; then
            echo "Release $VERSION" > release_notes.md
          fi

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if gh release view '${{ github.ref_name }}' --repo '${{ github.repository }}' >/dev/null 2>&1; then
            echo "Release '${{ github.ref_name }}' already exists, updating metadata."
            gh release edit '${{ github.ref_name }}' \
              --repo '${{ github.repository }}' \
              --notes-file release_notes.md \
              --title 'Release ${{ github.ref_name }}'
          else
            gh release create '${{ github.ref_name }}' \
              --repo '${{ github.repository }}' \
              --notes-file release_notes.md \
              --title 'Release ${{ github.ref_name }}'
          fi

      - name: Upload distribution files to release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release upload '${{ github.ref_name }}' dist/** \
            --repo '${{ github.repository }}' \
            --clobber
